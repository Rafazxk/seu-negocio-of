<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Proposta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="usuario.css">
</head>
<body>

    <form id="leadForm">
        <h1>Nova Solicitação</h1>
        
        <label>Nome Completo</label>
        <input type="text" id="nome" required placeholder="Seu nome">

        <label>E-mail</label>
        <input type="email" id="email" required placeholder="seu@email.com">
        
        <label>Telefone</label>
        <input type="tel" id="telefone" required placeholder="(00) 00000-0000">

        <label>Descreva sua ideia</label>
        <textarea id="descricao" required placeholder="Como posso te ajudar?"></textarea>

        <button type="submit" id="btnEnviar">Enviar Formulário</button>
    </form>

    <script src="usuario.js"></script>
</body>
</html>
